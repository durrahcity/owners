<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بيانات التصريح</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #f0f0f0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            min-height: 100vh;
            padding: 10px;
        }

        .card { 
            background: white; 
            width: 100%; 
            max-width: 500px; 
            border: 2px solid #2c3e50; 
            padding: 20px; 
            border-radius: 10px; 
            text-align: center; 
            font-weight: bolder; 
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        h2 { margin-top: 0; }

        /* تنسيق الجدول ليطابق الصورة */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 15px 0; 
        }

        th, td { 
            border: 1px solid #dcdcdc; 
            padding: 10px; 
            text-align: center; 
            background-color: #f0f8ff; /* لون الخلفية الفاتح كما في الصورة */
        }
        
        th { color: #555; }
        td { color: #2c3e50; }

        /* تنسيق الهوية لتكون زرقاء */
        .visitor-id-cell { color: #3b7196 !important; }

        #qrcode { margin-top: 15px; display: flex; justify-content: center; }

        .social-container { 
            width: 100%; 
            max-width: 500px; 
            text-align: center;
        }
        .social-container img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }
    </style>
</head>
<body>

<div class="card" id="permit-card">
    <h2>بيانات التصريح</h2>
    <p>تاريخ التصريح: <span id="date"></span></p>
    <p style="color: red;">القطاع : <span id="sector"></span></p>
    
    <svg id="barcode"></svg>
    <p>الوحدة : <span id="unit"></span></p>
    <p>اسم المالك : <span id="owner"></span></p>
    <p>عدد ايام التصريح : <span id="days"></span></p>
    <p>عدد مرات الدخول بالتصريح : <span id="entries"></span></p>

    <table>
        <tr><th>اسماء الزوار</th><th>الهوية</th></tr>
        <tr><td id="visitor-name"></td><td class="visitor-id-cell" id="visitor-id"></td></tr>
    </table>

    <div id="qrcode"></div>
</div>

<div class="social-container">
    <img src="https://i.postimg.cc/50TpMxTH/Whats-App-Image-2026-06-22-at-5-12-01-PM.jpg" alt="Social Media">
</div>

<script>
    const data = {
        date: "13.06.2026",
        sector: "قطاع رقم 4",
        unit: "D2F2B209",
        owner: "عبد القادر عبد الغفور امين قشقري",
        days: "3",
        entries: "10",
        visitorName: "مم حسان دوش",
        visitorId: "1116425768"
    };

    document.getElementById('date').innerText = data.date;
    document.getElementById('sector').innerText = data.sector;
    document.getElementById('unit').innerText = data.unit;
    document.getElementById('owner').innerText = data.owner;
    document.getElementById('days').innerText = data.days;
    document.getElementById('entries').innerText = data.entries;
    document.getElementById('visitor-name').innerText = data.visitorName;
    document.getElementById('visitor-id').innerText = data.visitorId;

    JsBarcode("#barcode", data.unit, { width: 1.5, height: 70, displayValue: false });
    new QRCode(document.getElementById("qrcode"), "https://durrahcity.github.io/owners/");
</script>
</body>
</html>
